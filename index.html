<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Us - Private Network</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#128C7E">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3616/3616215.png">
    
    <!-- React, Tailwind CSS, and Lucide Icons Frameworks -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        waGreen: '#128C7E',
                        waLightGreen: '#25D366',
                        waDarkBg: '#111b21',
                        waDarkChat: '#0b141a',
                        waIncoming: '#202c33',
                        waOutgoing: '#005c4b'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 text-gray-900 transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        function PrivateApp() {
            // --- STATE ENGINE ---
            const [user, setUser] = React.useState(localStorage.getItem('currentUser') || null);
            const [usernameInput, setUsernameInput] = React.useState('');
            const [passwordInput, setPasswordInput] = React.useState('');
            const [loginAvatar, setLoginAvatar] = React.useState('https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150');
            const [loginError, setLoginError] = React.useState('');
            
            const [view, setView] = React.useState('chats'); 
            const [theme, setTheme] = React.useState(localStorage.getItem('theme') || 'dark');
            
            // Communication Records Storage
            const [messages, setMessages] = React.useState(JSON.parse(localStorage.getItem('chat_messages')) || []);
            const [statuses, setStatuses] = React.useState(JSON.parse(localStorage.getItem('chat_statuses')) || []);
            
            // Dynamic identity management
            const [rayProfile, setRayProfile] = React.useState(localStorage.getItem('ray_pic') || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150');
            const [cherryProfile, setCherryProfile] = React.useState(localStorage.getItem('cherry_pic') || 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150');
            
            const [textInput, setTextInput] = React.useState('');
            const [statusInput, setStatusInput] = React.useState('');
            const [isTyping, setIsTyping] = React.useState(false);
            const [otherUserTyping, setOtherUserTyping] = React.useState(false);
            const [viewOnceActive, setViewOnceActive] = React.useState(false);
            
            // Voice Calling System states
            const [callState, setCallState] = React.useState('idle'); // idle, calling, ringing, connected
            const [callSeconds, setCallSeconds] = React.useState(0);

            const otherUser = user === 'Ray' ? 'Cherry' : 'Ray';
            const userAvatar = user === 'Ray' ? rayProfile : cherryProfile;
            const otherAvatar = user === 'Ray' ? cherryProfile : rayProfile;

            // --- EFFECTS & HOUSEKEEPING LIKES ---
            React.useEffect(() => {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                localStorage.setItem('theme', theme);
            }, [theme]);

            React.useEffect(() => {
                localStorage.setItem('chat_messages', JSON.stringify(messages));
            }, [messages]);

            // Real-Time 24-Hour Expiration Check for Statuses
            React.useEffect(() => {
                const checkExpiry = () => {
                    const activeStatuses = JSON.parse(localStorage.getItem('chat_statuses')) || [];
                    const limit24h = 24 * 60 * 60 * 1000; 
                    const filtered = activeStatuses.filter(s => (Date.now() - new Date(s.timestamp).getTime()) < limit24h);
                    
                    if (filtered.length !== statuses.length) {
                        setStatuses(filtered);
                        localStorage.setItem('chat_statuses', JSON.stringify(filtered));
                    }
                };
                checkExpiry();
                const trackingInterval = setInterval(checkExpiry, 60000); // Check every minute
                return () => clearInterval(trackingInterval);
            }, [statuses]);

            // Call Duration Counter
            React.useEffect(() => {
                let timer = null;
                if (callState === 'connected') {
                    timer = setInterval(() => {
                        setCallSeconds(prev => prev + 1);
                    }, 1000);
                } else {
                    setCallSeconds(0);
                }
                return () => clearInterval(timer);
            }, [callState]);

            React.useEffect(() => {
                if (textInput.length > 0 && !isTyping) {
                    setIsTyping(true);
                    setTimeout(() => setOtherUserTyping(true), 800);
                } else if (textInput.length === 0 && isTyping) {
                    setIsTyping(false);
                    setTimeout(() => setOtherUserTyping(false), 1400);
                }
            }, [textInput]);

            // --- AUTHENTICATION & CORE LOGIC ---
            const handleUploadLoginPicture = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setLoginAvatar(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSecureLogin = (e) => {
                e.preventDefault();
                const cleanUser = usernameInput.trim().toLowerCase();
                
                if (passwordInput !== '15.01.2026') {
                    setLoginError('Incorrect anniversary validation key.');
                    return;
                }

                if (cleanUser === 'ray' || cleanUser === 'cherry') {
                    const formattedName = cleanUser === 'ray' ? 'Ray' : 'Cherry';
                    
                    let activeProfiles = JSON.parse(localStorage.getItem('registered_users')) || [];
                    if (activeProfiles.length >= 2 && !activeProfiles.includes(formattedName)) {
                        setLoginError('Security Access Closed: Space is already filled.');
                        return;
                    }
                    if (!activeProfiles.includes(formattedName)) {
                        activeProfiles.push(formattedName);
                        localStorage.setItem('registered_users', JSON.stringify(activeProfiles));
                    }

                    // Save custom avatar uploaded during login immediately
                    if (formattedName === 'Ray') {
                        setRayProfile(loginAvatar);
                        localStorage.setItem('ray_pic', loginAvatar);
                    } else {
                        setCherryProfile(loginAvatar);
                        localStorage.setItem('cherry_pic', loginAvatar);
                    }

                    localStorage.setItem('currentUser', formattedName);
                    setUser(formattedName);
                } else {
                    setLoginError('Access denied. Only Ray or Cherry can register node profiles.');
                }
            };

            const handleSendStructuredDrop = (e, mediaType = null, mediaUrl = null) => {
                if (e) e.preventDefault();
                if (!textInput.trim() && !mediaUrl) return;

                const packageMessage = {
                    id: Date.now(),
                    sender: user,
                    text: mediaUrl ? '' : textInput,
                    timestamp: new Date().toISOString(),
                    status: 'sent',
                    mediaType: mediaType,
                    mediaUrl: mediaUrl,
                    viewOnce: viewOnceActive,
                    opened: false
                };

                setMessages([...messages, packageMessage]);
                setTextInput('');
                setViewOnceActive(false);

                // Simulation checkmarks flow
                setTimeout(() => {
                    setMessages(prev => prev.map(m => m.id === packageMessage.id ? {...m, status: 'delivered'} : m));
                }, 900);
                setTimeout(() => {
                    setMessages(prev => prev.map(m => m.id === packageMessage.id ? {...m, status: 'read'} : m));
                }, 2000);
            };

            const handlePublishStatusNode = (e) => {
                e.preventDefault();
                if (!statusInput.trim()) return;

                const statusLog = {
                    id: Date.now(),
                    creator: user,
                    text: statusInput,
                    timestamp: new Date().toISOString()
                };

                const dynamicList = [statusLog, ...statuses];
                setStatuses(dynamicList);
                localStorage.setItem('chat_statuses', JSON.stringify(dynamicList));
                setStatusInput('');
            };

            const triggerDeleteTimerWindow = (msgId) => {
                const selectedMsg = messages.find(m => m.id === msgId);
                if (!selectedMsg) return;

                const durationMinutes = (Date.now() - new Date(selectedMsg.timestamp).getTime()) / 1000 / 60;
                
                if (selectedMsg.status === 'read') {
                    alert("Security Lockout: Recipient has already accessed this node.");
                    return;
                }
                if (durationMinutes > 30) {
                    alert("Time-frame expired: Messages cannot be deleted after 30 minutes.");
                    return;
                }

                setMessages(messages.map(m => m.id === msgId ? { ...m, text: "🚫 You deleted this message", mediaUrl: null, mediaType: null } : m));
            };

            const revealViewOnceObject = (msgId) => {
                setMessages(messages.map(m => m.id === msgId ? { ...m, opened: true } : m));
            };

            const formatCallTimer = (secCount) => {
                const m = Math.floor(secCount / 60).toString().padStart(2, '0');
                const s = (secCount % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            const handleLogoutDestruct = () => {
                localStorage.removeItem('currentUser');
                setUser(null);
            };

            // --- USER INTERFACE RENDERING ROUTER ---
            if (!user) {
                return (
                    <div className="min-h-screen bg-[#0b141a] flex flex-col justify-center items-center p-4 text-white font-sans">
                        <div className="w-full max-w-sm bg-[#222e35] p-6 rounded-2xl shadow-2xl border border-gray-700/60">
                            <div className="flex justify-center text-emerald-500 mb-2">
                                <i data-lucide="shield-check" className="w-10 h-10"></i>
                            </div>
                            <h2 className="text-xl font-bold text-center tracking-wide">Secure Space Login</h2>
                            <p className="text-gray-400 text-xs text-center mb-6">Initialize Ray & Cherry Connection Channels</p>
                            
                            <form onSubmit={handleSecureLogin} className="space-y-4">
                                {/* First Time Login Photo Upload Selector */}
                                <div className="flex flex-col items-center justify-center">
                                    <div className="relative w-20 h-20">
                                        <img src={loginAvatar} className="w-20 h-20 rounded-full object-cover border-2 border-emerald-500 shadow-md" />
                                        <label className="absolute bottom-0 right-0 bg-emerald-500 hover:bg-emerald-400 text-white p-1.5 rounded-full cursor-pointer shadow-lg transition-transform hover:scale-105">
                                            <i data-lucide="camera" className="w-3.5 h-3.5"></i>
                                            <input type="file" accept="image/*" onChange={handleUploadLoginPicture} className="hidden" />
                                        </label>
                                    </div>
                                    <span className="text-[10px] text-gray-400 mt-1.5 font-medium">Set Login Profile Photo</span>
                                </div>

                                <div>
                                    <label className="text-xs font-semibold text-gray-300 block mb-1">Select Identity Node</label>
                                    <input type="text" placeholder="Type 'Ray' or 'Cherry'" value={usernameInput} onChange={e => setUsernameInput(e.target.value)} className="w-full bg-[#2a3942] p-2.5 rounded-lg border border-gray-600 focus:outline-none focus:border-emerald-500 text-white text-sm" required />
                                </div>
                                <div>
                                    <label className="text-xs font-semibold text-gray-300 block mb-1">Anniversary Access Password</label>
                                    <input type="password" placeholder="DD.MM.YYYY" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} className="w-full bg-[#2a3942] p-2.5 rounded-lg border border-gray-600 focus:outline-none focus:border-emerald-500 text-white text-sm" required />
                                </div>
                                {loginError && <p className="text-red-400 text-xs text-center font-medium bg-red-500/10 py-1.5 rounded">{loginError}</p>}
                                <button type="submit" className="w-full bg-[#00a884] hover:bg-[#008f72] font-bold p-2.5 rounded-lg transition duration-200 text-sm shadow-md">Establish Connection</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col bg-white dark:bg-waDarkChat text-gray-800 dark:text-gray-100 shadow-2xl relative overflow-hidden font-sans">
                    
                    {/* COMPLETE FULLSCREEN INTERACTIVE VOICE CALL OVERLAY */}
                    {callState !== 'idle' && (
                        <div className="absolute inset-0 bg-[#111b21] z-50 flex flex-col justify-between items-center py-16 px-10 text-white animate-fade-in">
                            <div className="text-center space-y-4">
                                <div className="flex justify-center items-center gap-1 mb-2">
                                    <i data-lucide="lock" className="w-3 h-3 text-emerald-400"></i>
                                    <span className="text-[10px] tracking-widest text-gray-400 uppercase font-mono">End-to-End Encrypted</span>
                                </div>
                                <div className="relative">
                                    <img src={otherAvatar} className="w-24 h-24 rounded-full object-cover border-4 border-[#00a884] mx-auto shadow-2xl" />
                                    <div className="absolute inset-0 rounded-full border-4 border-emerald-500 animate-ping opacity-20"></div>
                                </div>
                                <h3 className="text-2xl font-bold tracking-wide mt-2">{otherUser}</h3>
                                
                                <div className="text-sm font-medium tracking-wide">
                                    {callState === 'calling' && <p className="text-gray-400 animate-pulse">CALLING WIRELINE...</p>}
                                    {callState === 'ringing' && <p className="text-emerald-400 animate-pulse">RINGING CHANNELS...</p>}
                                    {callState === 'connected' && (
                                        <div className="flex items-center justify-center gap-2 bg-[#202c33] px-4 py-1 rounded-full border border-gray-700">
                                            <span className="w-2 h-2 rounded-full bg-red-500 animate-ping"></span>
                                            <span className="font-mono text-emerald-400 font-bold">{formatCallTimer(callSeconds)}</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                            
                            <div className="w-full flex flex-col items-center gap-6">
                                {callState !== 'connected' && (
                                    <button onClick={() => setCallState('connected')} className="bg-[#00a884] hover:bg-[#008f72] px-6 py-2.5 rounded-full font-bold text-xs tracking-wider uppercase shadow-xl transition-all active:scale-95">
                                        Accept Call (Simulate)
                                    </button>
                                )}
                                <button onClick={() => setCallState('idle')} className="bg-red-600 hover:bg-red-500 p-4 rounded-full shadow-2xl transition-transform hover:scale-110 active:scale-90 border border-red-400/20">
                                    <i data-lucide="phone-off" className="w-7 h-7 text-white"></i>
                                </button>
                            </div>
                        </div>
                    )}

                    {/* CORE APP NAV BAR HEADER */}
                    <header className="bg-[#202c33] text-white px-4 py-3 flex items-center justify-between shadow-md z-10 border-b border-gray-800">
                        <div className="flex items-center gap-3">
                            <img src={otherAvatar} alt="Partner Node" className="w-10 h-10 rounded-full object-cover border border-gray-700" />
                            <div>
                                <h1 className="font-bold text-base tracking-wide">{view === 'chats' ? otherUser : view.toUpperCase()}</h1>
                                {view === 'chats' && (
                                    <span className="text-[11px] text-[#00a884] block font-medium">
                                        {otherUserTyping ? 'typing voice note...' : 'online'}
                                    </span>
                                )}
                            </div>
                        </div>
                        <div className="flex items-center gap-3.5">
                            {view === 'chats' && (
                                <button onClick={() => setCallState('calling')} className="p-1.5 text-gray-300 hover:text-white rounded-full hover:bg-gray-700/50 transition" title="Start Secure Voice Call">
                                    <i data-lucide="phone" className="w-5 h-5"></i>
                                </button>
                            )}
                            <button onClick={() => setView('chats')} className={`p-1.5 rounded-full transition ${view === 'chats' ? 'text-[#00a884] bg-gray-700/40' : 'text-gray-300'}`}><i data-lucide="message-square" className="w-5 h-5"></i></button>
                            <button onClick={() => setView('status')} className={`p-1.5 rounded-full transition ${view === 'status' ? 'text-[#00a884] bg-gray-700/40' : 'text-gray-300'}`}><i data-lucide="aperture" className="w-5 h-5"></i></button>
                            <button onClick={() => setView('settings')} className={`p-1.5 rounded-full transition ${view === 'settings' ? 'text-[#00a884] bg-gray-700/40' : 'text-gray-300'}`}><i data-lucide="settings" className="w-5 h-5"></i></button>
                        </div>
                    </header>

                    {/* CORE SCROLL NODE */}
                    <main className="flex-1 overflow-y-auto bg-[#0b141a] relative">
                        
                        {/* CHAT DISPLAY NODE PANELS */}
                        {view === 'chats' && (
                            <div className="flex flex-col h-full justify-between">
                                <div className="p-4 space-y-3.5 flex-1 overflow-y-auto scrollbar-thin">
                                    {messages.length === 0 ? (
                                        <div className="text-center text-gray-500 mt-20 text-xs italic font-medium px-6">Encrypted stream open. Drop text, voice notes, view-once payloads, or videos below.</div>
                                    ) : (
                                        messages.map((msg) => {
                                            const isMe = msg.sender === user;
                                            return (
                                                <div key={msg.id} className={`flex ${isMe ? 'justify-end' : 'justify-start'}`}>
                                                    <div className={`max-w-[80%] rounded-xl px-3 py-2 shadow-md text-[13.5px] relative group border transition-all ${
                                                        isMe ? 'bg-waOutgoing border-teal-800/20 text-white rounded-tr-none' : 'bg-waIncoming border-gray-800 text-white rounded-tl-none'
                                                    }`}>
                                                        {/* 30-Min Strict Delete Button Trigger */}
                                                        {isMe && msg.text !== "🚫 You deleted this message" && (
                                                            <button onClick={() => triggerDeleteTimerWindow(msg.id)} className="absolute -top-2.5 -left-2.5 bg-red-600 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity duration-150 shadow-lg border border-red-500/20" title="Revoke Node">
                                                                <i data-lucide="trash-2" className="w-3 h-3"></i>
                                                            </button>
                                                        )}

                                                        {/* MEDIA RENDER ENGINE */}
                                                        {msg.mediaType && (
                                                            <div className="mb-1.5 rounded-lg overflow-hidden bg-black/20 p-1">
                                                                {msg.viewOnce && !msg.opened ? (
                                                                    <button type="button" onClick={() => revealViewOnceObject(msg.id)} className="flex items-center gap-2 bg-emerald-950/40 text-[#25D366] p-3 rounded-lg text-xs font-bold tracking-wide border border-dashed border-emerald-700 w-full hover:bg-emerald-900/30 transition">
                                                                        <i data-lucide="eye-off" className="w-4 h-4"></i> Opened View-Once Payload (Tap to Reveal)
                                                                    </button>
                                                                ) : msg.viewOnce && msg.opened ? (
                                                                    <div className="flex items-center gap-2 text-gray-500 p-2 text-xs font-semibold">
                                                                        <i data-lucide="check-check" className="w-4 h-4"></i> Opened View Once Content
                                                                    </div>
                                                                ) : msg.mediaType === 'image' ? (
                                                                    <img src={msg.mediaUrl} className="max-h-48 w-full object-cover rounded-md" />
                                                                ) : msg.mediaType === 'video' ? (
                                                                    <video src={msg.mediaUrl} controls className="max-h-48 w-full object-cover rounded-md" />
                                                                ) : msg.mediaType === 'voice' ? (
                                                                    <div className="flex items-center gap-2 py-1 px-2 min-w-[200px]">
                                                                        <i data-lucide="play" className="w-5 h-5 text-emerald-400 cursor-pointer"></i>
                                                                        <div className="flex-1 bg-gray-600 h-1.5 rounded-full overflow-hidden relative">
                                                                            <div className="bg-emerald-400 w-1/3 h-full rounded-full"></div>
                                                                        </div>
                                                                        <i data-lucide="mic" className="w-4 h-4 text-emerald-400"></i>
                                                                    </div>
                                                                ) : null}
                                                            </div>
                                                        )}

                                                        {msg.text && <p className="leading-relaxed break-words pr-4 font-medium">{msg.text}</p>}
                                                        
                                                        <div className="flex items-center justify-end gap-1 mt-1 text-[9px] text-gray-400">
                                                            <span>{new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                                                            {isMe && (
                                                                <span>
                                                                    {msg.status === 'sent' && <i data-lucide="check" className="w-3 h-3 text-gray-400"></i>}
                                                                    {msg.status === 'delivered' && <div className="flex"><i data-lucide="check" className="w-3 h-3 text-gray-400"></i><i data-lucide="check" className="w-3 h-3 text-gray-400 -ml-1.5"></i></div>}
                                                                    {msg.status === 'read' && <div className="flex"><i data-lucide="check" className="w-3 h-3 text-waLightGreen"></i><i data-lucide="check" className="w-3 h-3 text-waLightGreen -ml-1.5"></i></div>}
                                                                </span>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>

                                {/* ATTACHMENT CONSOLE FORM PANEL */}
                                <form onSubmit={handleSendStructuredDrop} className="bg-[#1f2c34] p-3 flex items-center gap-1.5 border-t border-gray-800">
                                    <button type="button" onClick={() => setViewOnceActive(!viewOnceActive)} className={`p-2 rounded-full transition-all duration-150 ${viewOnceActive ? 'bg-amber-500 text-white scale-105 animate-pulse' : 'text-gray-400 hover:bg-gray-700'}`} title="Toggle View Once Module">
                                        <i data-lucide="eye" className="w-5 h-5"></i>
                                    </button>
                                    
                                    <button type="button" onClick={() => handleSendStructuredDrop(null, 'image', 'https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=400')} className="p-2 text-gray-400 hover:bg-gray-700 rounded-full" title="Inject Photo Asset">
                                        <i data-lucide="image" className="w-5 h-5"></i>
                                    </button>
                                    <button type="button" onClick={() => handleSendStructuredDrop(null, 'video', 'https://www.w3schools.com/html/mov_bbb.mp4')} className="p-2 text-gray-400 hover:bg-gray-700 rounded-full" title="Inject Video Stream">
                                        <i data-lucide="video" className="w-5 h-5"></i>
                                    </button>
                                    <button type="button" onClick={() => handleSendStructuredDrop(null, 'voice', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')} className="p-2 text-gray-400 hover:bg-gray-700 rounded-full" title="Drop Recorded Voice Memo">
                                        <i data-lucide="mic" className="w-5 h-5"></i>
                                    </button>

                                    <input type="text" placeholder="Type message..." value={textInput} onChange={e => setTextInput(e.target.value)} className="flex-1 bg-[#2a3942] p-2 px-4 rounded-full text-sm focus:outline-none text-white placeholder-gray-400 border-none" />
                                    <button type="submit" className="bg-[#00a884] text-white p-2.5 rounded-full shadow-md hover:bg-[#008f72] transition"><i data-lucide="send" className="w-4 h-4"></i></button>
                                </form>
                            </div>
                        )}

                        {/* STATUS VIEW NODES (STRICT 24 HOUR EXPIRATION MATRIX) */}
                        {view === 'status' && (
                            <div className="p-4 space-y-4">
                                <form onSubmit={handlePublishStatusNode} className="bg-[#111b21] p-4 rounded-xl shadow-md border border-gray-800 space-y-2.5">
                                    <h3 className="text-[11px] font-bold text-[#00a884] uppercase tracking-wider">Post Status Story (Wipes in 24 Hours)</h3>
                                    <div className="flex gap-2">
                                        <input type="text" placeholder="Type a 24-hour status update..." value={statusInput} onChange={e => setStatusInput(e.target.value)} className="flex-1 bg-[#2a3942] p-2.5 rounded-lg text-sm border-none focus:outline-none text-white" required />
                                        <button type="submit" className="bg-[#00a884] hover:bg-[#008f72] text-white px-4 rounded-lg text-xs font-bold transition">Post</button>
                                    </div>
                                </form>

                                <div className="space-y-2">
                                    <h4 className="text-xs font-semibold text-gray-400 tracking-wider px-1">Active Timeline Stories</h4>
                                    {statuses.length === 0 ? (
                                        <div className="p-6 text-center text-xs italic text-gray-500 bg-[#111b21] rounded-xl border border-gray-800/40">No active stories logged within the last 24 hours.</div>
                                    ) : (
                                        statuses.map(st => (
                                            <div key={st.id} className="bg-[#111b21] p-3 rounded-xl border border-gray-800 flex items-center gap-3 animate-fade-in">
                                                <div className="p-0.5 rounded-full border-2 border-[#00a884]">
                                                    <img src={st.creator === user ? userAvatar : otherAvatar} className="w-9 h-9 rounded-full object-cover" />
                                                </div>
                                                <div className="flex-1">
                                                    <span className="text-xs font-bold text-emerald-400 block">{st.creator}</span>
                                                    <p className="text-sm font-medium mt-0.5 text-white/90">{st.text}</p>
                                                    <span className="text-[9px] text-gray-500 block mt-1 font-mono">{new Date(st.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} • Active Node</span>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {/* CONFIGURATION / PREFERENCES SETTINGS VIEW */}
                        {view === 'settings' && (
                            <div className="p-4 space-y-4">
                                <div className="bg-[#111b21] rounded-xl p-4 border border-gray-800 space-y-4">
                                    <h3 className="font-bold border-b border-gray-800 pb-2 text-[#00a884] text-xs uppercase tracking-wider">Preferences Console</h3>
                                    <div className="flex items-center justify-between">
                                        <span className="text-sm font-medium text-gray-200">Layout Appearance Mode</span>
                                        <button type="button" onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="p-2 rounded-lg bg-gray-800 text-amber-400 font-bold text-xs flex items-center gap-1.5 transition">
                                            {theme === 'dark' ? <><i data-lucide="sun" className="w-4 h-4"></i> Light Mode</> : <><i data-lucide="moon" className="w-4 h-4"></i> Dark Mode</>}
                                        </button>
                                    </div>
                                </div>
                                
                                <button onClick={handleLogoutDestruct} className="w-full bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 text-red-400 p-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition">
                                    <i data-lucide="log-out" className="w-4 h-4"></i> Reset Workspace Session
                                </button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PrivateApp />);

        // Lucide Interface Refresh Elements
        setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 200);
        document.addEventListener('click', () => { setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 50); });
    </script>
</body>
</html>
