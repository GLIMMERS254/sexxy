<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Us - Private Chat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#128C7E">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3616/3616215.png">
    
    <!-- React, Tailwind CSS, and Lucide Icons -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        waGreen: '#128C7E',
                        waLightGreen: '#25D366',
                        waDarkBg: '#111b21',
                        waDarkChat: '#0b141a'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 text-gray-900 transition-colors duration-200">
    <div id="root"></div>

    <script type="text/babel">
        function PrivateApp() {
            // --- STATE MANAGEMENT ---
            const [user, setUser] = React.useState(localStorage.getItem('currentUser') || null);
            const [usernameInput, setUsernameInput] = React.useState('');
            const [passwordInput, setPasswordInput] = React.useState('');
            const [loginAvatar, setLoginAvatar] = React.useState('https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150');
            const [loginError, setLoginError] = React.useState('');
            
            const [view, setView] = React.useState('chats'); 
            const [theme, setTheme] = React.useState(localStorage.getItem('theme') || 'light');
            
            // Database Emulation layers
            const [messages, setMessages] = React.useState(JSON.parse(localStorage.getItem('chat_messages')) || []);
            const [statuses, setStatuses] = React.useState(JSON.parse(localStorage.getItem('chat_statuses')) || []);
            
            const [rayProfile, setRayProfile] = React.useState(localStorage.getItem('ray_pic') || 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150');
            const [cherryProfile, setCherryProfile] = React.useState(localStorage.getItem('cherry_pic') || 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150');
            
            const [textInput, setTextInput] = React.useState('');
            const [statusInput, setStatusInput] = React.useState('');
            const [isTyping, setIsTyping] = React.useState(false);
            const [otherUserTyping, setOtherUserTyping] = React.useState(false);
            const [viewOnceActive, setViewOnceActive] = React.useState(false);
            
            // Calling Interface State
            const [callState, setCallState] = React.useState('idle'); // idle, ringing, connected
            const [callSeconds, setCallSeconds] = React.useState(0);

            const otherUser = user === 'Ray' ? 'Cherry' : 'Ray';
            const userAvatar = user === 'Ray' ? rayProfile : cherryProfile;
            const otherAvatar = user === 'Ray' ? cherryProfile : rayProfile;

            // --- EFFECTS ---
            React.useEffect(() => {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                localStorage.setItem('theme', theme);
            }, [theme]);

            React.useEffect(() => {
                localStorage.setItem('chat_messages', JSON.stringify(messages));
            }, [messages]);

            React.useEffect(() => {
                // Background maintenance task: Filter out stories older than 24 hours
                const expirationLimit = 24 * 60 * 60 * 1000; // 24 Hours in milliseconds
                const validStatuses = statuses.filter(s => (Date.now() - new Date(s.timestamp).getTime()) < expirationLimit);
                if (validStatuses.length !== statuses.length) {
                    setStatuses(validStatuses);
                    localStorage.setItem('chat_statuses', JSON.stringify(validStatuses));
                }
            }, [statuses]);

            // Call Timer Tracker
            React.useEffect(() => {
                let interval = null;
                if (callState === 'connected') {
                    interval = setInterval(() => {
                        setCallSeconds(prev => prev + 1);
                    }, 1000);
                } else {
                    setCallSeconds(0);
                }
                return () => clearInterval(interval);
            }, [callState]);

            React.useEffect(() => {
                if (textInput.length > 0 && !isTyping) {
                    setIsTyping(true);
                    setTimeout(() => setOtherUserTyping(true), 600);
                } else if (textInput.length === 0 && isTyping) {
                    setIsTyping(false);
                    setTimeout(() => setOtherUserTyping(false), 1500);
                }
            }, [textInput]);

            // --- HANDLERS ---
            const handleLoginProfilePic = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setLoginAvatar(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const cleanUser = usernameInput.trim().toLowerCase();
                
                if (passwordInput !== '15.01.2026') {
                    setLoginError('Incorrect custom password.');
                    return;
                }

                if (cleanUser === 'ray' || cleanUser === 'cherry') {
                    const formattedName = cleanUser === 'ray' ? 'Ray' : 'Cherry';
                    
                    let registeredUsers = JSON.parse(localStorage.getItem('registered_users')) || [];
                    if (registeredUsers.length >= 2 && !registeredUsers.includes(formattedName)) {
                        setLoginError('Access locked: Workspace completely populated.');
                        return;
                    }
                    if (!registeredUsers.includes(formattedName)) {
                        registeredUsers.push(formattedName);
                        localStorage.setItem('registered_users', JSON.stringify(registeredUsers));
                    }

                    // Map down the customized login photo directly to storage profiles
                    if (formattedName === 'Ray') {
                        setRayProfile(loginAvatar);
                        localStorage.setItem('ray_pic', loginAvatar);
                    } else {
                        setCherryProfile(loginAvatar);
                        localStorage.setItem('cherry_pic', loginAvatar);
                    }

                    localStorage.setItem('currentUser', formattedName);
                    setUser(formattedName);
                } else {
                    setLoginError('Only Ray or Cherry can access this system.');
                }
            };

            const handleSendMessage = (e, mediaType = null, mediaUrl = null) => {
                if (e) e.preventDefault();
                if (!textInput.trim() && !mediaUrl) return;

                const newMsg = {
                    id: Date.now(),
                    sender: user,
                    text: mediaUrl ? '' : textInput,
                    timestamp: new Date().toISOString(),
                    status: 'sent',
                    mediaType: mediaType,
                    mediaUrl: mediaUrl,
                    viewOnce: viewOnceActive,
                    opened: false
                };

                setMessages([...messages, newMsg]);
                setTextInput('');
                setViewOnceActive(false);

                setTimeout(() => {
                    setMessages(prev => prev.map(m => m.id === newMsg.id ? {...m, status: 'delivered'} : m));
                }, 1000);

                setTimeout(() => {
                    setMessages(prev => prev.map(m => m.id === newMsg.id ? {...m, status: 'read'} : m));
                }, 2500);
            };

            const handlePostStatus = (e) => {
                e.preventDefault();
                if (!statusInput.trim()) return;

                const newStatus = {
                    id: Date.now(),
                    creator: user,
                    text: statusInput,
                    timestamp: new Date().toISOString()
                };

                const updatedStatuses = [newStatus, ...statuses];
                setStatuses(updatedStatuses);
                localStorage.setItem('chat_statuses', JSON.stringify(updatedStatuses));
                setStatusInput('');
            };

            const handleDeleteMessage = (msgId) => {
                const targetMsg = messages.find(m => m.id === msgId);
                if (!targetMsg) return;

                const minutesPassed = (Date.now() - new Date(targetMsg.timestamp).getTime()) / 1000 / 60;
                
                if (targetMsg.status === 'read') {
                    alert("Cannot delete: Recipient has read this content.");
                    return;
                }
                if (minutesPassed > 30) {
                    alert("Cannot delete: Passed 30-minute security window.");
                    return;
                }

                setMessages(messages.map(m => m.id === msgId ? { ...m, text: "🚫 You deleted this message", mediaUrl: null, mediaType: null } : m));
            };

            const formatTime = (totalSeconds) => {
                const mins = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
                const secs = (totalSeconds % 60).toString().padStart(2, '0');
                return `${mins}:${secs}`;
            };

            const triggerViewOnce = (msgId) => {
                setMessages(messages.map(m => m.id === msgId ? { ...m, opened: true, text: "👀 View Once Opened" } : m));
            };

            const handleLogout = () => {
                localStorage.removeItem('currentUser');
                setUser(null);
            };

            // --- LOGIN INTERFACE ---
            if (!user) {
                return (
                    <div className="min-h-screen bg-gray-900 flex flex-col justify-center items-center p-6 text-white font-sans">
                        <div className="w-full max-w-sm bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
                            <h2 className="text-2xl font-bold text-center mb-1 tracking-wide">Our Workspace</h2>
                            <p className="text-gray-400 text-xs text-center mb-6">Setup Identity Configuration</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                {/* Profile Upload on Login */}
                                <div className="flex flex-col items-center mb-2">
                                    <div className="relative w-20 h-20 group">
                                        <img src={loginAvatar} className="w-20 h-20 rounded-full object-cover border-2 border-emerald-500" />
                                        <label className="absolute bottom-0 right-0 bg-emerald-500 text-white p-1 rounded-full cursor-pointer shadow-md">
                                            <i data-lucide="camera" className="w-3.5 h-3.5"></i>
                                            <input type="file" accept="image/*" onChange={handleLoginProfilePic} className="hidden" />
                                        </label>
                                    </div>
                                    <span className="text-[11px] text-gray-400 mt-1">Tap camera to upload your picture</span>
                                </div>

                                <div>
                                    <label className="text-xs font-semibold text-gray-400 block mb-1">Who are you?</label>
                                    <input type="text" placeholder="Ray or Cherry" value={usernameInput} onChange={e => setUsernameInput(e.target.value)} className="w-full bg-gray-700 p-2.5 rounded-lg border border-gray-600 focus:outline-none focus:border-emerald-500 text-white text-sm" required />
                                </div>
                                <div>
                                    <label className="text-xs font-semibold text-gray-400 block mb-1">Shared Key</label>
                                    <input type="password" placeholder="DD.MM.YYYY" value={passwordInput} onChange={e => setPasswordInput(e.target.value)} className="w-full bg-gray-700 p-2.5 rounded-lg border border-gray-600 focus:outline-none focus:border-emerald-500 text-white text-sm" required />
                                </div>
                                {loginError && <p className="text-red-400 text-xs text-center font-medium">{loginError}</p>}
                                <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-500 font-bold p-2.5 rounded-lg transition duration-200 shadow-md">Authenticate</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col bg-white dark:bg-waDarkChat text-gray-800 dark:text-gray-100 shadow-2xl relative overflow-hidden">
                    
                    {/* SYSTEM CALL LAYER OVERLAY */}
                    {callState !== 'idle' && (
                        <div className="absolute inset-0 bg-gray-900 z-50 flex flex-col justify-between items-center p-12 text-white animate-fade-in">
                            <div className="text-center mt-8">
                                <img src={otherAvatar} className="w-28 h-28 rounded-full object-cover border-4 border-emerald-500 mx-auto mb-4 animate-pulse" />
                                <h2 className="text-2xl font-bold">{otherUser}</h2>
                                <p className="text-emerald-400 text-sm mt-1 tracking-wider font-mono">
                                    {callState === 'ringing' ? 'RINGING CHANNELS...' : `SECURE CALL • ${formatTime(callSeconds)}`}
                                </p>
                            </div>
                            
                            {callState === 'ringing' && (
                                <button onClick={() => setCallState('connected')} className="bg-emerald-500 hover:bg-emerald-400 p-4 rounded-full shadow-lg text-white font-bold text-xs tracking-wider uppercase animate-bounce">
                                    Simulate Accept
                                </button>
                            )}

                            <button onClick={() => setCallState('idle')} className="bg-red-600 hover:bg-red-500 p-4 rounded-full shadow-xl transition-transform hover:scale-105">
                                <i data-lucide="phone-off" className="w-8 h-8"></i>
                            </button>
                        </div>
                    )}

                    {/* APP HEADER */}
                    <header className="bg-waGreen dark:bg-waDarkBg text-white px-4 py-3 flex items-center justify-between shadow-md z-10">
                        <div className="flex items-center gap-3">
                            <img src={otherAvatar} alt="Partner" className="w-10 h-10 rounded-full object-cover border border-white/20" />
                            <div>
                                <h1 className="font-bold text-base tracking-wide">{view === 'chats' ? otherUser : view.toUpperCase()}</h1>
                                {view === 'chats' && (
                                    <span className="text-xs text-emerald-200 block font-light">
                                        {otherUserTyping ? 'typing...' : 'online'}
                                    </span>
                                )}
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            {view === 'chats' && (
                                <button onClick={() => setCallState('ringing')} className="p-1 text-emerald-100 hover:text-white" title="Initiate Secure Voice Channel">
                                    <i data-lucide="phone"></i>
                                </button>
                            )}
                            <button onClick={() => setView('chats')} className={`p-1 ${view === 'chats' ? 'text-emerald-300' : ''}`}><i data-lucide="message-square"></i></button>
                            <button onClick={() => setView('status')} className={`p-1 ${view === 'status' ? 'text-emerald-300' : ''}`}><i data-lucide="aperture"></i></button>
                            <button onClick={() => setView('settings')} className={`p-1 ${view === 'settings' ? 'text-emerald-300' : ''}`}><i data-lucide="settings"></i></button>
                        </div>
                    </header>

                    {/* CORE SCROLL VIEW */}
                    <main className="flex-1 overflow-y-auto bg-orange-50/40 dark:bg-waDarkChat relative">
                        
                        {/* CHAT VIEW ENGINE */}
                        {view === 'chats' && (
                            <div className="flex flex-col h-full justify-between">
                                <div className="p-4 space-y-3 flex-1 overflow-y-auto">
                                    {messages.map((msg) => {
                                        const isMe = msg.sender === user;
                                        return (
                                            <div key={msg.id} className={`flex ${isMe ? 'justify-end' : 'justify-start'}`}>
                                                <div className={`max-w-[75%] rounded-xl px-3 py-2 shadow-sm text-sm relative group ${
                                                    isMe ? 'bg-[#d9fdd3] dark:bg-[#005c4b] text-gray-900 dark:text-white rounded-tr-none' : 'bg-white dark:bg-[#202c33] text-gray-900 dark:text-white rounded-tl-none'
                                                }`}>
                                                    {isMe && msg.text !== "🚫 You deleted this message" && (
                                                        <button onClick={() => handleDeleteMessage(msg.id)} className="absolute -top-2 -left-2 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity duration-150 shadow-md">
                                                            <i data-lucide="trash-2" className="w-3 h-3"></i>
                                                        </button>
                                                    )}

                                                    {msg.mediaType && (
                                                        <div className="mb-2 rounded-lg overflow-hidden">
                                                            {msg.viewOnce && !msg.opened ? (
                                                                <button type="button" onClick={() => triggerViewOnce(msg.id)} className="flex items-center gap-2 bg-black/10 dark:bg-white/10 p-3 rounded text-xs font-semibold tracking-wide border border-dashed border-gray-400">
                                                                    <i data-lucide="eye-off" className="text-emerald-500"></i> View Once Media (Tap to open)
                                                                </button>
                                                            ) : msg.mediaType === 'image' ? (
                                                                <img src={msg.mediaUrl} className="max-h-48 w-full object-cover" />
                                                            ) : msg.mediaType === 'video' ? (
                                                                <video src={msg.mediaUrl} controls className="max-h-48 w-full object-cover" />
                                                            ) : (
                                                                <audio src={msg.mediaUrl} controls className="w-full mt-1" />
                                                            )}
                                                        </div>
                                                    )}

                                                    {msg.text && <p className="leading-relaxed break-words pr-8">{msg.text}</p>}
                                                    
                                                    <div className="flex items-center justify-end gap-1 mt-1 text-[10px] text-gray-400 dark:text-gray-300">
                                                        <span>{new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                                                        {isMe && (
                                                            <span>
                                                                {msg.status === 'sent' && <i data-lucide="check" className="w-3 h-3 text-gray-400"></i>}
                                                                {msg.status === 'delivered' && <div className="flex"><i data-lucide="check" className="w-3 h-3 text-gray-400"></i><i data-lucide="check" className="w-3 h-3 text-gray-400 -ml-1.5"></i></div>}
                                                                {msg.status === 'read' && <div className="flex"><i data-lucide="check" className="w-3 h-3 text-waLightGreen"></i><i data-lucide="check" className="w-3 h-3 text-waLightGreen -ml-1.5"></i></div>}
                                                            </span>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* ATTACHMENTS BAR */}
                                <form onSubmit={handleSendMessage} className="bg-gray-100 dark:bg-[#202c33] p-3 flex items-center gap-2 border-t border-gray-200 dark:border-gray-800">
                                    <button type="button" onClick={() => setViewOnceActive(!viewOnceActive)} className={`p-2 rounded-full transition ${viewOnceActive ? 'bg-amber-500 text-white' : 'text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700'}`} title="View Once Flag">
                                        <i data-lucide="eye"></i>
                                    </button>
                                    
                                    <button type="button" onClick={() => handleSendMessage(null, 'image', 'https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=400')} className="p-2 text-gray-500 hover:bg-gray-200 rounded-full" title="Simulate Photo">
                                        <i data-lucide="image"></i>
                                    </button>
                                    <button type="button" onClick={() => handleSendMessage(null, 'video', 'https://www.w3schools.com/html/mov_bbb.mp4')} className="p-2 text-gray-500 hover:bg-gray-200 rounded-full" title="Simulate Video">
                                        <i data-lucide="video"></i>
                                    </button>
                                    <button type="button" onClick={() => handleSendMessage(null, 'voice', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')} className="p-2 text-gray-500 hover:bg-gray-200 rounded-full" title="Simulate Voice Memo">
                                        <i data-lucide="mic"></i>
                                    </button>

                                    <input type="text" placeholder="Type a message..." value={textInput} onChange={e => setTextInput(e.target.value)} className="flex-1 bg-white dark:bg-[#2a3942] p-2 px-4 rounded-full text-sm focus:outline-none text-black dark:text-white" />
                                    <button type="submit" className="bg-waGreen text-white p-2.5 rounded-full"><i data-lucide="send" className="w-4 h-4"></i></button>
                                </form>
                            </div>
                        )}

                        {/* STATUS VIEW (24-HOUR AUTO EXPIRY) */}
                        {view === 'status' && (
                            <div className="p-4 space-y-4">
                                <form onSubmit={handlePostStatus} className="bg-white dark:bg-[#202c33] p-4 rounded-xl shadow-sm space-y-2">
                                    <h3 className="text-xs font-bold text-waGreen uppercase tracking-wider">Update Status Node (Expires in 24h)</h3>
                                    <div className="flex gap-2">
                                        <input type="text" placeholder="What is on your mind?" value={statusInput} onChange={e => setStatusInput(e.target.value)} className="flex-1 bg-gray-50 dark:bg-[#2a3942] p-2 rounded-lg text-sm border-none focus:outline-none" />
                                        <button type="submit" className="bg-waGreen text-white px-4 rounded-lg text-xs font-bold">Post</button>
                                    </div>
                                </form>

                                <div className="space-y-2">
                                    <h4 className="text-xs font-semibold text-gray-400 tracking-wide px-1">Recent Logs</h4>
                                    {statuses.length === 0 ? (
                                        <div className="p-4 text-center text-xs italic text-gray-400">No active status channels. Updates clean out every 24 hours.</div>
                                    ) : (
                                        statuses.map(st => (
                                            <div key={st.id} className="bg-white dark:bg-[#202c33] p-3 rounded-xl shadow-sm flex items-center gap-3">
                                                <img src={st.creator === user ? userAvatar : otherAvatar} className="w-10 h-10 rounded-full object-cover border-2 border-emerald-400" />
                                                <div>
                                                    <span className="text-xs font-bold text-emerald-600 block">{st.creator}</span>
                                                    <p className="text-sm font-medium mt-0.5">{st.text}</p>
                                                    <span className="text-[9px] text-gray-400 block mt-1">{new Date(st.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}

                        {/* SETTINGS VIEW */}
                        {view === 'settings' && (
                            <div className="p-4 space-y-4">
                                <div className="bg-white dark:bg-[#202c33] rounded-xl p-4 shadow-sm space-y-4">
                                    <h3 className="font-bold border-b border-gray-100 dark:border-gray-700 pb-2 text-waGreen">Preferences</h3>
                                    <div className="flex items-center justify-between">
                                        <span className="text-sm font-medium">Dark Mode Layout Theme</span>
                                        <button type="button" onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')} className="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-amber-500 dark:text-amber-300 font-bold">
                                            {theme === 'dark' ? <i data-lucide="sun"></i> : <i data-lucide="moon"></i>}
                                        </button>
                                    </div>
                                </div>
                                <button onClick={handleLogout} className="w-full bg-red-500/10 hover:bg-red-500/20 text-red-500 p-3 rounded-xl font-bold text-sm flex items-center justify-center gap-2">
                                    <i data-lucide="log-out" className="w-4 h-4"></i> Clear Device Session
                                </button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PrivateApp />);

        setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 200);
        document.addEventListener('click', () => { setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 50); });
    </script>
</body>
</html>
